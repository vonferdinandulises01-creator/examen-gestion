<script>
    // BANCO DE DATOS DIVERSIFICADO (Casos 11-25 con contenido único)
    const bancoDefinitivo = [
        // ... (1 al 10 se mantienen igual)
        { p: "CASO 1: Diagnóstico PESTEL...", q: "¿Qué premisas garantizan una cimentación sólida?", o: ["a) 1, 2, 4", "b) 2, 3, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 2: Riesgo de Relevancia...", q: "¿Qué conjunto de factores valida la relevancia?", o: ["a) 2, 3, 5", "b) 1, 4, 6", "c) 3, 4, 5"], r: 1 },
        { p: "CASO 3: Coherencia Organizacional...", q: "¿Qué elementos aseguran la coherencia?", o: ["a) 1, 4, 6", "b) 2, 3, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 4: Early Adopters...", q: "¿Qué define al segmento de validación?", o: ["a) 1, 5, 6", "b) 2, 3, 4", "c) 3, 4, 6"], r: 0 },
        { p: "CASO 5: Línea Base Gemini...", q: "¿Qué requisitos otorgan validez técnica?", o: ["a) 1, 3, 6", "b) 2, 4, 5", "c) 3, 5, 6"], r: 1 },
        { p: "CASO 6: Comunicación Cultural...", q: "¿Cuáles son los pilares efectivos?", o: ["a) 1, 2, 5", "b) 2, 4, 5", "c) 2, 4, 6"], r: 2 },
        { p: "CASO 7: Canales B2B/B2C...", q: "¿Qué determina el éxito de distribución?", o: ["a) 1, 2, 6", "b) 3, 4, 5", "c) 2, 5, 6"], r: 0 },
        { p: "CASO 8: Socios Clave...", q: "¿Qué roles desempeñan los socios?", o: ["a) 1, 3, 4", "b) 1, 3, 6", "c) 2, 3, 5, 6"], r: 2 },
        { p: "CASO 9: Vehículos Jurídicos...", q: "¿Qué vehículos minimizan impacto financiero?", o: ["a) 1, 3, 4", "b) 2, 4, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 10: Bloqueo Nivel 5...", q: "¿Cuáles son las reglas de seguridad?", o: ["a) 1, 4, 5", "b) 2, 3, 4, 5", "c) 4, 5, 6"], r: 1 },
        
        // CONTENIDO NUEVO Y ESPECÍFICO (11 al 25)
        { p: "CASO 11: Ingeniería de Producto y Normas de Etiquetado. El auditor exige que el producto cumpla con la normativa técnica del país destino (ej. marcado CE en Europa).", q: "¿Qué factor es crítico en la arquitectura de valor técnica?", o: ["a) Cumplimiento de normas técnicas y certificaciones", "b) El diseño del logo únicamente", "c) El precio de venta en origen"], r: 0 },
        { p: "CASO 12: Resiliencia en Logística Internacional. Se presenta un bloqueo en el Canal de Suez afectando el tiempo de tránsito pactado con el cliente.", q: "¿Cuál es la acción de mitigación estratégica?", o: ["a) Cancelar el pedido", "b) Activar rutas multimodales y stock de seguridad", "c) Esperar a que el canal se libere"], r: 1 },
        { p: "CASO 13: Adaptabilidad en la Negociación. Un socio japonés valora el silencio y la jerarquía por encima de la rapidez del cierre.", q: "¿Qué estilo de negociación debe aplicarse?", o: ["a) Agresivo y dominante", "b) Adaptativo, respetando protocolos culturales", "c) Indiferente"], r: 1 },
        { p: "CASO 14: Valor Social Disruptivo. El proyecto propone contratar artesanos locales en destino para la etapa final de ensamblaje.", q: "¿Qué valida esta acción en la auditoría de sostenibilidad?", o: ["a) Solo es una estrategia de marketing", "b) Generación de valor compartido y legitimidad local", "c) Es un gasto innecesario"], r: 1 },
        { p: "CASO 15: Evaluación 'Drill-down' Financiera. El flujo de caja proyectado no considera el tipo de cambio volátil.", q: "¿Qué criterio define la viabilidad en esta fase?", o: ["a) Análisis de sensibilidad y cobertura cambiaria", "b) Ignorar el tipo de cambio", "c) Usar solo moneda nacional"], r: 0 },
        { p: "CASO 16: Gobernanza en Oficinas Remotas. Se requiere controlar la calidad del servicio en una sucursal en Madrid desde México.", q: "¿Qué herramienta asegura el control organizacional?", o: ["a) Reportes mensuales por correo", "b) Cuadro de Mando Integral (KPIs) en tiempo real", "c) Confianza absoluta sin métricas"], r: 1 },
        { p: "CASO 17: Estructura de Matriz y Filiales. Se debate si las decisiones de marketing deben ser tomadas por la matriz central.", q: "¿Cuál es el enfoque más equilibrado?", o: ["a) Centralización total", "b) Descentralización absoluta", "c) Modelo Glocal: Estrategia global, ejecución local"], r: 2 },
        { p: "CASO 18: Identificación de Trendsetting. El mercado demanda productos 'Plastic-Free' con urgencia regulatoria.", q: "¿Cómo se sustenta técnicamente esta tendencia?", o: ["a) Con reportes de macrotendencias y Gaps legales", "b) Por intuición del equipo", "c) Copiando a la competencia directa"], r: 0 },
        { p: "CASO 19: Validación de Tracción. Se han recibido 50 cartas de intención de compra de distribuidores internacionales.", q: "¿Qué representa esto para el inversionista?", o: ["a) Una validación de demanda real (Tracción)", "b) Datos irrelevantes", "c) Solo un ejercicio teórico"], r: 0 },
        { p: "CASO 20: Acreditación Gemini. Para obtener el Semáforo Verde, se requiere coherencia total entre fases.", q: "¿Qué invalida el proceso de auditoría?", o: ["a) Tener menos de 5 páginas", "b) Cargar prompts masivos sin análisis secuencial", "c) Usar gráficos a color"], r: 1 },
        { p: "CASO 21: Alianza de Capital (Joint Venture). Se busca un socio local para compartir riesgos de inversión en Brasil.", q: "¿Cuál es el pilar de esta alianza?", o: ["a) Transparencia técnica y alineación de objetivos", "b) El capital es lo único que importa", "c) La desconfianza mutua"], r: 0 },
        { p: "CASO 22: Mitigación de Riesgo de Ejecución. El MVP falla en las pruebas de clima extremo del país destino.", q: "¿Qué acción de ingeniería procede?", o: ["a) Lanzar el producto así", "b) Rediseño técnico basado en el diagnóstico del entorno", "c) Cambiar de país"], r: 1 },
        { p: "CASO 23: Ética y Legitimidad. Se descubre que un proveedor secundario no cumple con normas laborales.", q: "¿Cómo debe actuar el Plan de Negocios Internacional?", o: ["a) Ignorarlo si el precio es bajo", "b) Aplicar el código de ética y sustituir al proveedor", "c) Ocultar la información"], r: 1 },
        { p: "CASO 24: Secuencia de Internacionalización. El equipo quiere invertir en publicidad antes de registrar la marca.", q: "¿Cuál es el orden lógico de ingeniería?", o: ["a) Marketing -> Registro -> Venta", "b) Diagnóstico -> Protección Legal -> Comunicación", "c) Venta -> Diagnóstico -> Registro"], r: 1 },
        { p: "CASO 25: Auditoría de Automatización. El sistema detecta patrones de respuesta idénticos en múltiples usuarios.", q: "¿Qué norma de integridad se está evaluando?", o: ["a) Autenticidad del análisis y procesamiento individual", "b) Velocidad de respuesta", "c) Cantidad de texto generado"], r: 0 }
    ];

    let current = 0, score = 0, userAnswers = [];
    let qTimer;

    function iniciarExamen() {
        const n = document.getElementById('nom').value;
        const m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Identificación requerida.");
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        document.getElementById('watermark').innerHTML = `${n}<br>${m}`;
        render();
    }

    function render() {
        if(current >= 25) return finish();
        clearInterval(qTimer);
        let qTime = 80;
        document.getElementById('timer-bar').style.width = "100%";
        qTimer = setInterval(() => {
            qTime--;
            document.getElementById('timer-bar').style.width = (qTime/80)*100 + "%";
            if(qTime <= 0) saveAns(-1);
        }, 1000);

        const d = bancoDefinitivo[current];
        document.getElementById('content').innerHTML = `
            <div class="planteamiento"><b>CASO ${current+1}:</b><br>${d.p}</div>
            <h3 style="color:#fff;">${d.q}</h3>
            ${d.o.map((opt, i) => `<div class="option" onclick="saveAns(${i})">${opt}</div>`).join('')}
        `;
    }

    function saveAns(idx) {
        clearInterval(qTimer);
        const correct = (idx === bancoDefinitivo[current].r);
        userAnswers.push(correct);
        if(correct) score++;
        current++;
        render();
    }

    function finish() {
        const nota = ((score / 25) * 10).toFixed(2);
        const nombre = document.getElementById('nom').value;
        const matricula = document.getElementById('mat').value;

        // CORRECCIÓN DE ENVÍO: Usar IDs correctos de tu Formulario
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdFBOwuPUjxnZdqSy-4YItdhe8lt5naeYaSoROCsZaMPhgkUw/formResponse";
        
        const data = new URLSearchParams();
        data.append("entry.2005620554", nombre);      // Revisa que este ID sea el de "Nombre"
        data.append("entry.1045792443", matricula);   // Revisa que este ID sea el de "Matrícula"
        data.append("entry.1065046570", nota);        // Revisa que este ID sea el de "Nota"
        data.append("entry.1166974658", `Texcoco. Aciertos: ${score}/25`);

        fetch(formURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: data.toString()
        }).then(() => {
            console.log("Datos enviados");
        }).catch(err => console.error("Error envío:", err));

        document.getElementById('score-display').innerText = nota;
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        mostrarRevision();
    }

    function mostrarRevision() {
        let h = "";
        bancoDefinitivo.forEach((p, i) => {
            if(!userAnswers[i]) h += `<div class="rev-card"><strong>FALLO EN CASO ${i+1}:</strong><p>${p.p}</p></div>`;
        });
        document.getElementById('rev-lista').innerHTML = h || "<h3>SIN ERRORES TÉCNICOS</h3>";
    }
</script>
