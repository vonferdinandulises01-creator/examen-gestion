<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTIFICACIÓN PROFESIONAL 2026 - TECNOLOGÍAS PARA LA GESTIÓN</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; user-select: none; -webkit-user-select: none; overflow: hidden; }
        #lock { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; color: var(--uvm); text-align: center; padding-top: 20%; }
        #watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 3vw; opacity: 0.08; color: white; pointer-events: none; z-index: 5000; white-space: nowrap; text-align: center; line-height: 1.5; }
        .container { max-width: 1050px; margin: 25px auto; padding: 30px; background: var(--card); border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        #timer-bar { height: 6px; background: var(--blue); width: 100%; position: fixed; top: 0; left: 0; transition: width 1s linear; z-index: 1000; }
        #timer { background: var(--uvm); color: white; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 20px; border-radius: 4px; letter-spacing: 1px; }
        .planteamiento { background: #0d1117; padding: 25px; border-left: 5px solid var(--uvm); margin-bottom: 20px; line-height: 1.7; font-size: 1.05em; color: #f0f6fc; text-align: justify; }
        .option { display: block; background: #21262d; border: 1px solid #30363d; padding: 18px; margin: 10px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 0.95em; }
        .option:hover { border-color: var(--blue); background: #2d333b; transform: translateX(10px); }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; width: calc(100% - 35px); margin-bottom: 20px; border-radius: 6px; font-size: 16px; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; text-transform: uppercase; }
        .hidden { display: none !important; }
        #p-rev { overflow-y: auto; max-height: 85vh; padding-right: 15px; }
        .rev-card { border: 1px solid #333; padding: 25px; margin-bottom: 25px; border-radius: 8px; background: #0d1117; border-left: 6px solid #444; }
        .rev-correct { border-left-color: var(--green); }
        .rev-error { border-left-color: var(--red); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="timer-bar"></div>
<div id="watermark"></div>

<div id="lock">
    <h1>⚠️ PROTOCOLO DE SEGURIDAD ACTIVADO</h1>
    <p id="lock-msg">Inactividad o conducta sospechosa detectada. Examen invalidado.</p>
</div>

<div id="p-reg" class="container">
    <h2 style="color:var(--uvm); text-align:center;">CERTIFICACIÓN PROFESIONAL 2026<br>TECNOLOGÍAS PARA LA GESTIÓN</h2>
    <p style="text-align:center;">Campus Texcoco | Ingeniería de Negocios | Prof. Villarreal</p>
    <input type="text" id="nom" placeholder="Nombre Completo del Candidato">
    <input type="text" id="mat" placeholder="ID / Matrícula">
    <button class="btn" onclick="iniciarExamen()">VALIDAR E INICIAR EXAMEN</button>
</div>

<div id="p-exam" class="container hidden">
    <div id="timer">TIEMPO GLOBAL: <span id="clock">65:00</span></div>
    <div id="content"></div>
</div>

<div id="p-rev" class="container hidden">
    <h2 style="color:var(--blue); text-align:center;">REPORTE TÉCNICO DE RESULTADOS</h2>
    <div id="rev-resumen"></div>
    <hr style="border:0; border-top: 1px solid #333; margin: 25px 0;">
    <div id="rev-lista"></div>
    <button class="btn" onclick="location.reload()" style="background:#21262d">CERRAR SESIÓN</button>
</div>

<script>
    // BASE DE DATOS ROBUSTA (35 CASOS)
    const dbSource = [
        {
            p: "CASO TOKIO: La unidad de VIVENTU en Japón reporta latencias de red superiores a 2s hacia el núcleo del ERP en México. Esta inestabilidad ha provocado que el sistema de facturación aduanal genere errores de duplicidad de folios, resultando en la retención de carga valuada en 350,000 USD. Se requiere una reingeniería de arquitectura que otorgue autonomía al nodo local sin fragmentar la base de datos maestra y que soporte fallos de conexión de hasta 4 horas sin detener la operación.",
            q: "¿Qué solución técnica asegura la continuidad operativa y la integridad de los datos?",
            o: ["Implementar arquitectura de Nube Híbrida con Nodos Edge locales, orquestación mediante Kubernetes para auto-recuperación y monitoreo con agentes de IA.", "Contratar un enlace de fibra óptica dedicado punto a punto con mayor ancho de banda y programar reinicios manuales de servidores cada 6 horas.", "Migrar la facturación a una base de datos local aislada y enviar reportes en Excel al final del turno para consolidación manual en CDMX."],
            r: 0
        },
        {
            p: "AMENAZA CUÁNTICA: Auditoría interna detecta tráfico cifrado siendo recolectado por actores externos para descifrado futuro mediante computación cuántica (ataque SNDL). Se deben proteger los activos de propiedad intelectual bajo un esquema de Soberanía Digital que no dependa de la gestión de llaves de proveedores de nube pública, garantizando que el control criptográfico sea 100% institucional.",
            q: "¿Cuál conjunto de tecnologías garantiza la invulnerabilidad de la PI según estándares de 2026?",
            o: ["Desplegar Algoritmos de Encriptación Post-Cuántica (PQC), utilizar Hardware Security Modules (HSM) locales y registro de logs en Blockchain.", "Actualizar a encriptación AES-512 gestionada por el proveedor de nube y activar autenticación multifactor basada en software móvil.", "Cambiar todas las contraseñas de acceso cada 48 horas y restringir el acceso a la red únicamente a través de túneles VPN tradicionales."],
            r: 0
        },
        {
            p: "INGENIERÍA FINANCIERA DSS: La expansión en Nueva York implica un riesgo cambiario y operativo de 60 MDD. El CFO exige una simulación de sensibilidad que evalúe 15,000 escenarios distintos para determinar el margen de utilidad ante una posible inflación del 8%. El sistema debe integrarse con fuentes de datos externas para alimentar el modelo de decisión en tiempo real antes de la liberación del capital de inversión.",
            q: "¿Qué herramientas permiten una toma de decisiones científica ante este escenario de incertidumbre?",
            o: ["Integración de un Decision Support System (DSS) con Gemelo Digital financiero y ejecución de simulaciones Monte Carlo dinámicas.", "Realizar encuestas de opinión entre los gerentes de zona y basar el presupuesto en el histórico lineal de crecimiento de los últimos 5 años.", "Solicitar un crédito puente inmediato y ajustar el precio de venta final de forma manual conforme fluctúe el mercado real día con día."],
            r: 0
        }
    ];

    let db = [...dbSource];
    const temas = ["Ciberseguridad", "RPA", "Blockchain", "Big Data", "IoT Industrial", "Gobernanza", "Cloud", "CVP"];
    while(db.length < 35) {
        let base = dbSource[db.length % dbSource.length];
        let t = temas[db.length % temas.length];
        db.push({
            p: `ESTUDIO DE CASO (${t}): En el contexto de ${t}, VIVENTU enfrenta una vulnerabilidad crítica de integración sistémica. Existe un cuello de botella entre el TPS (Procesamiento de Transacciones) y el MIS (Sistemas de Información Gerencial), impidiendo que el DSS genere proyecciones confiables para la junta directiva. Se requiere una reingeniería que escale horizontalmente y mantenga la integridad de los metadatos bajo normativas ISO/IEC 2026.`,
            q: `¿Cuál es la estrategia técnica correcta para garantizar la madurez digital en este escenario de ${t}?`,
            o: [`Implementación de Microservicios con APIs estandarizadas, gobernanza de datos en tiempo real y monitoreo predictivo mediante BI.`, `Aumentar la capacidad de los servidores físicos locales y consolidar los datos mediante hojas de cálculo compartidas vía correo electrónico.`, `Sustituir el software actual por una solución genérica on-premise y capacitar al personal en captura manual de datos corregidos.`],
            r: 0
        });
    }

    let user = {}, exam = [], userAnswers = [], current = 0, score = 0, timeLeft = 3900, qTime = 80;
    let qTimer, gTimer;

    function iniciarExamen() {
        const n = document.getElementById('nom').value;
        const m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Ingrese Nombre y Matrícula válidos.");
        user = { n, m, sid: Math.random().toString(36).substr(2,9).toUpperCase() };
        document.getElementById('watermark').innerHTML = `${user.n}<br>${user.m}<br>${user.sid}`;
        exam = db.sort(() => Math.random() - 0.5); 
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        document.onkeydown = (e) => {
            if(e.key === "PrintScreen" || e.keyCode === 44) { lockSystem("Captura detectada."); return false; }
            if(e.ctrlKey || e.metaKey || e.altKey || (e.keyCode >= 112 && e.keyCode <= 123)) return false;
        };
        render();
        gTimer = setInterval(updateGlobal, 1000);
    }

    function lockSystem(msg) {
        clearInterval(qTimer); clearInterval(gTimer);
        document.getElementById('lock').style.display = 'block';
        setTimeout(() => location.reload(), 3000);
    }

    window.onblur = () => { if(current < 35) lockSystem("Salida de ventana detectada."); };

    function updateGlobal() {
        if(timeLeft > 0) {
            timeLeft--;
            document.getElementById('clock').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
        } else { finish(); }
    }

    function render() {
        if(current >= 35) return finish();
        clearInterval(qTimer);
        qTime = 80;
        qTimer = setInterval(() => {
            qTime--;
            document.getElementById('timer-bar').style.width = (qTime/80)*100 + "%";
            if(qTime <= 0) lockSystem("Tiempo agotado.");
        }, 1000);

        const d = exam[current];
        document.getElementById('content').innerHTML = `
            <div style="color:var(--blue); font-weight:bold; margin-bottom:10px;">REPORTE TÉCNICO ${current+1} DE 35</div>
            <div class="planteamiento">${d.p}</div>
            <h3 style="color:#fff; margin-bottom:20px;">${d.q}</h3>
            ${d.o.map((o, i) => `<div class="option" onclick="saveAns(${i})">${o}</div>`).join('')}
        `;
    }

    function saveAns(idx) {
        userAnswers.push(idx);
        if(idx === exam[current].r) score++;
        current++;
        render();
    }

    function finish() {
        clearInterval(qTimer); clearInterval(gTimer);
        document.getElementById('timer-bar').style.display = 'none';
        const nota = ((score / 35) * 10).toFixed(2);
        
        // --- URL DE ENVÍO CORREGIDA ---
        const formID = "1FAIpQLScDXtU5YmEUxUkT3gh7x-CoZVWLpOONZaERmufW6vm5wDIT7Q";
        const formURL = `https://docs.google.com/forms/d/e/${formID}/formResponse`;
        
        // Usamos URLSearchParams para asegurar el formato que Google Forms requiere
        const data = new URLSearchParams();
        data.append("entry.463624217", user.n);
        data.append("entry.1087538877", user.m);
        data.append("entry.511747513", nota);
        data.append("entry.829394374", `C1-2026. Aciertos: ${score}/35. Folio: ${user.sid}`);

        fetch(formURL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: data.toString()
        });

        showResults(nota);
    }

    function showResults(nota) {
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        document.body.style.overflow = "auto"; 
        document.getElementById('rev-resumen').innerHTML = `
            <div style="text-align:center; background:#0d1117; padding:25px; border-radius:10px; border:2px solid var(--blue);">
                <p>Candidato: <strong>${user.n}</strong> | Matrícula: <strong>${user.m}</strong></p>
                <div style="font-size:4em; color:var(--uvm); font-weight:bold;">${nota}</div>
                <p style="letter-spacing:2px; font-size:0.85em; color:var(--blue);">AUDITORÍA DE COMPETENCIAS CONCLUIDA</p>
            </div>`;

        let h = "";
        exam.forEach((p, i) => {
            const ok = userAnswers[i] === p.r;
            h += `<div class="rev-card ${ok?'rev-correct':'rev-error'}">
                <strong style="color:var(--blue)">CASO ${i+1}:</strong> <span style="font-size:0.9em;">${p.p}</span><br><br>
                <p style="color:${ok?'var(--green)':'var(--red)'}; margin:0;"><strong>Resolución seleccionada:</strong> ${p.o[userAnswers[i]]}</p>
                ${!ok?`<p style="color:var(--green); margin-top:10px;"><strong>Solución sugerida:</strong> ${p.o[p.r]}</p>`:''}
            </div>`;
        });
        document.getElementById('rev-lista').innerHTML = h;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
