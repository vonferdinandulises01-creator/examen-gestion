        { p: "CASO 25: Auditoría de procesos ante automatización masiva...", q: "¿Qué normas rigen la interacción con la auditoría?", o: ["a) 1, 2, 4, 6", "b) 2, 3, 4", "c) 2, 4, 5"], r: 0 }
    ];

    let current = 0, score = 0, timeLeft = 3600, userAnswers = [];
    let qTimer, qTime = 80;

    function iniciarExamen() {
        const n = document.getElementById('nom').value;
        const m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Identificación requerida.");

        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        document.getElementById('watermark').innerHTML = `${n}<br>${m}`;
        
        render(); // Empieza en la posición 0 (Caso 1)

        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('clock').innerText = 
                    Math.floor(timeLeft/60).toString().padStart(2,'0') + ":" + 
                    (timeLeft%60).toString().padStart(2,'0');
            }
        }, 1000);
        
        window.onblur = null; // Desactiva recargas por perder foco
    }

    function render() {
        if(current >= bancoDefinitivo.length) return finish();
        
        clearInterval(qTimer); 
        qTime = 80;
        document.getElementById('timer-bar').style.width = "100%";
        
        qTimer = setInterval(() => {
            qTime--;
            document.getElementById('timer-bar').style.width = (qTime/80)*100 + "%";
            if(qTime <= 0) saveAns(-1); 
        }, 1000);

        const d = bancoDefinitivo[current]; 
        document.getElementById('content').innerHTML = `
            <div class="planteamiento" style="border-left: 5px solid #c41e3a; padding: 15px; background: #0d1117;">
                <strong>REACTIVO ${current + 1}:</strong><br>${d.p}
            </div>
            <h3 style="color:#fff; margin-top: 15px;">${d.q}</h3>
            <div class="option" onclick="saveAns(0)">${d.o[0]}</div>
            <div class="option" onclick="saveAns(1)">${d.o[1]}</div>
            <div class="option" onclick="saveAns(2)">${d.o[2]}</div>
        `;
    }

    function saveAns(idx) {
        if (current >= bancoDefinitivo.length) return;

        const isCorrect = (idx === bancoDefinitivo[current].r);
        userAnswers.push(isCorrect);
        if(isCorrect) score++;
        
        current++; // Incremento estrictamente lineal
        render();
    }
</script>
