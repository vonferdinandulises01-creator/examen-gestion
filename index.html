<script>
    // BANCO DE DATOS: 25 REACTIVOS ÚNICOS (Orden Estricto)
    const bancoDefinitivo = [
        { p: "CASO 1: Diagnóstico profundo PESTEL y Gap de Mercado...", q: "¿Qué premisas garantizan una cimentación estratégica sólida?", o: ["a) 1, 2, 4", "b) 2, 3, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 2: Auditoría de Riesgo de Relevancia...", q: "¿Qué conjunto de factores valida la relevancia técnica?", o: ["a) 2, 3, 5", "b) 1, 4, 6", "c) 3, 4, 5"], r: 1 },
        { p: "CASO 3: Coherencia entre diseño organizacional y diagnóstico...", q: "¿Qué elementos aseguran la coherencia operativa?", o: ["a) 1, 4, 6", "b) 2, 3, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 4: Identificación de Early Adopters globales...", q: "¿Qué características definen al segmento de validación?", o: ["a) 1, 5, 6", "b) 2, 3, 4", "c) 3, 4, 6"], r: 0 },
        { p: "CASO 5: Línea Base en Fase 0 con Gemini...", q: "¿Qué requisitos otorgan validez técnica a la Fase 0?", o: ["a) 1, 3, 6", "b) 2, 4, 5", "c) 3, 5, 6"], r: 1 },
        { p: "CASO 6: Plan de Comunicación y adaptación cultural...", q: "¿Cuáles son los pilares de la comunicación efectiva?", o: ["a) 1, 2, 5", "b) 2, 4, 5", "c) 2, 4, 6"], r: 2 },
        { p: "CASO 7: Selección de Canales y Gestión B2B/B2C...", q: "¿Qué factores determinan el éxito de la distribución?", o: ["a) 1, 2, 6", "b) 3, 4, 5", "c) 2, 5, 6"], r: 0 },
        { p: "CASO 8: Red de Socios Clave para mitigar riesgo de entrada...", q: "¿Qué roles desempeñan los socios estratégicos?", o: ["a) 1, 3, 4", "b) 1, 3, 6", "c) 2, 3, 5, 6"], r: 2 },
        { p: "CASO 9: Vehículos Jurídicos (Licencias, Franquicias, Consorcios)...", q: "¿Qué vehículos minimizan el impacto financiero?", o: ["a) 1, 3, 4", "b) 2, 4, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 10: Protocolo de Bloqueo Secuencial Nivel 5...", q: "¿Cuáles son las reglas de seguridad de auditoría?", o: ["a) 1, 4, 5", "b) 2, 3, 4, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 11: Fase 6: Arquitectura de Valor y Logística...", q: "¿Qué componentes integran la arquitectura de valor?", o: ["a) 1, 3, 4", "b) 2, 3, 6", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 12: Simulación de Quiebre de Suministro (Huelga)...", q: "¿Cómo se garantiza la continuidad de la cadena?", o: ["a) 1, 2, 4", "b) 2, 4, 5", "c) 3, 4, 5, 6"], r: 2 },
        { p: "CASO 13: Negociación internacional y estilo bicultural...", q: "¿Qué tácticas aseguran un acuerdo exitoso?", o: ["a) 1, 3, 5", "b) 3, 4, 6", "c) 2, 4, 5"], r: 0 },
        { p: "CASO 14: Modelo de Sostenibilidad y Valor Social...", q: "¿Cómo se fundamenta el compromiso ético?", o: ["a) 2, 4, 5", "b) 1, 3, 5, 6", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 15: Evaluación Drill-down final para inversión...", q: "¿Qué criterios definen el éxito de la consultoría?", o: ["a) 2, 3, 4, 6", "b) 1, 3, 6", "c) 2, 4, 5"], r: 0 },
        { p: "CASO 16: Estrategias de Control Organizacional y KPIs...", q: "¿Qué herramientas garantizan la gobernanza global?", o: ["a) 1, 2, 4, 6", "b) 3, 5, 6", "c) 2, 4, 5"], r: 0 },
        { p: "CASO 17: Centralización vs Descentralización en Tokio...", q: "¿Cuál es la estructura organizacional óptima?", o: ["a) 1, 2, 4", "b) 2, 4, 5", "c) 2, 3, 5, 6"], r: 2 },
        { p: "CASO 18: Justificar tendencia Trendsetter en salud...", q: "¿Qué factores definen a un Trendsetter?", o: ["a) 1, 3, 4, 6", "b) 1, 2, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 19: Evaluación de Tracción mediante datos reales...", q: "¿Cómo se valida científicamente la tracción?", o: ["a) 1, 2, 4, 6", "b) 2, 4, 6", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 20: Certificado de Auditoría Gemini y Semáforo...", q: "¿Qué condiciones aseguran la acreditación?", o: ["a) 1, 4, 6", "b) 1, 2, 3", "c) 2, 3, 4, 5"], r: 2 },
        { p: "CASO 21: Tácticas para alianza de capital duradera...", q: "¿Qué pilares sostienen la alianza de capital?", o: ["a) 1, 2, 5, 6", "b) 2, 4, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 22: Riesgo de Ejecución del MVP...", q: "¿Qué factores eliminan el riesgo de ejecución?", o: ["a) 1, 3, 6", "b) 2, 4, 5", "c) 1, 3, 4, 6"], r: 2 },
        { p: "CASO 23: Integración de Valor Social y Legitimidad...", q: "¿Cómo impacta el valor social en la legitimidad?", o: ["a) 1, 3, 5, 6", "b) 3, 4, 6", "c) 2, 5, 6"], r: 0 },
        { p: "CASO 24: Ruta para la Internacionalización (Orden lógico)...", q: "¿Cuál es la secuencia de la ruta de éxito?", o: ["a) 1, 4, 6", "b) 1, 3, 4", "c) 2, 3, 4, 6"], r: 2 },
        { p: "CASO 25: Auditoría ante automatización masiva...", q: "¿Qué normas rigen la interacción con la auditoría?", o: ["a) 1, 2, 4, 6", "b) 2, 3, 4", "c) 2, 4, 5"], r: 0 }
    ];

    let indiceActual = 0;
    let aciertos = 0;
    let respuestasUsuario = [];
    let tiempoRestanteGlobal = 3600;
    let timerPregunta;

    function iniciarExamen() {
        const nombre = document.getElementById('nom').value;
        const matricula = document.getElementById('mat').value;

        if (nombre.length < 5 || matricula.length < 3) {
            alert("Error: Ingrese datos válidos para la auditoría.");
            return;
        }

        // Bloqueo de reinicio por foco eliminado
        window.onblur = null;

        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        document.getElementById('watermark').innerHTML = `${nombre}<br>${matricula}`;

        // Timer General
        setInterval(() => {
            if (tiempoRestanteGlobal > 0) {
                tiempoRestanteGlobal--;
                let min = Math.floor(tiempoRestanteGlobal / 60);
                let seg = tiempoRestanteGlobal % 60;
                document.getElementById('clock').innerText = `${min}:${seg < 10 ? '0' : ''}${seg}`;
            }
        }, 1000);

        mostrarPregunta();
    }

    function mostrarPregunta() {
        if (indiceActual >= bancoDefinitivo.length) {
            finalizarExamen();
            return;
        }

        // Reset de Timer de Pregunta
        clearInterval(timerPregunta);
        let tiempoBarra = 80;
        document.getElementById('timer-bar').style.width = "100%";

        timerPregunta = setInterval(() => {
            tiempoBarra--;
            document.getElementById('timer-bar').style.width = (tiempoBarra / 80 * 100) + "%";
            if (tiempoBarra <= 0) {
                procesarRespuesta(-1); // Salta por tiempo
            }
        }, 1000);

        const item = bancoDefinitivo[indiceActual];
        const contenedor = document.getElementById('content');

        // Renderizado Limpio
        contenedor.innerHTML = `
            <div class="planteamiento">
                <b style="color:var(--uvm)">REACTIVO ${indiceActual + 1} DE 25</b><br><br>
                ${item.p}
            </div>
            <h3 style="color:#fff">${item.q}</h3>
            <div id="opciones-container">
                <div class="option" onclick="procesarRespuesta(0)">${item.o[0]}</div>
                <div class="option" onclick="procesarRespuesta(1)">${item.o[1]}</div>
                <div class="option" onclick="procesarRespuesta(2)">${item.o[2]}</div>
            </div>
        `;
    }

    function procesarRespuesta(opcionSeleccionada) {
        // Detener timer inmediatamente para evitar saltos dobles
        clearInterval(timerPregunta);

        const itemActual = bancoDefinitivo[indiceActual];
        const esCorrecta = (opcionSeleccionada === itemActual.r);

        respuestasUsuario.push(esCorrecta);
        if (esCorrecta) aciertos++;

        // Avanzar índice y mostrar siguiente
        indiceActual++;
        mostrarPregunta();
    }

    function finalizarExamen() {
        clearInterval(timerPregunta);
        localStorage.setItem("pni_parcial_final_v12", "true");

        const calificacion = ((aciertos / 25) * 10).toFixed(2);
        const nombre = document.getElementById('nom').value;
        const matricula = document.getElementById('mat').value;

        // ENVÍO AL FORMS (Método de Formulario Oculto para evitar bloqueos CORS)
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdFBOwuPUjxnZdqSy-4YItdhe8lt5naeYaSoROCsZaMPhgkUw/formResponse";
        const form = document.createElement("form");
        form.method = "POST";
        form.action = formURL;
        form.target = "hidden_iframe";

        const campos = {
            "entry.2005620554": nombre,
            "entry.1045792443": matricula,
            "entry.1065046570": calificacion,
            "entry.1166974658": `C1-2026 Texcoco. Aciertos: ${aciertos}/25`
        };

        for (let key in campos) {
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = key;
            input.value = campos[key];
            form.appendChild(input);
        }

        const iframe = document.createElement("iframe");
        iframe.name = "hidden_iframe";
        iframe.style.display = "none";
        document.body.appendChild(iframe);
        document.body.appendChild(form);
        
        form.submit();

        // Mostrar resultados
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        document.getElementById('score-display').innerText = calificacion;

        mostrarRevision();
    }

    function mostrarRevision() {
        let listado = "";
        bancoDefinitivo.forEach((pregunta, i) => {
            if (!respuestasUsuario[i]) {
                listado += `<div class="rev-card"><strong>ERROR EN REACTIVO ${i + 1}:</strong><br><p>${pregunta.p}</p></div>`;
            }
        });
        document.getElementById('rev-lista').innerHTML = listado || "<h3>CERTIFICACIÓN EXITOSA</h3>";

        let countdown = 20;
        setInterval(() => {
            countdown--;
            document.getElementById('rev-countdown').innerText = countdown;
            if (countdown <= 0) location.reload();
        }, 1000);
    }
</script>
