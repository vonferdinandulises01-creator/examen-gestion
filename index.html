<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTIFICACIÓN TECNOLOGÍAS PARA LA GESTIÓN 2026</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --red: #da3633; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; user-select: none; -webkit-user-select: none; }
        #lock { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; color: var(--uvm); text-align: center; padding-top: 20%; }
        .container { max-width: 900px; margin: 40px auto; padding: 30px; background: var(--card); border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #timer { position: sticky; top: 0; background: var(--uvm); color: white; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; z-index: 100; margin-bottom: 20px; }
        .planteamiento { background: #0d1117; padding: 20px; border-left: 5px solid var(--uvm); margin-bottom: 15px; line-height: 1.6; border-radius: 4px; }
        .option { display: block; background: #21262d; border: 1px solid #30363d; padding: 15px; margin: 10px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .option:hover { border-color: var(--blue); background: #2d333b; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; width: calc(100% - 35px); margin-bottom: 20px; border-radius: 6px; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; text-transform: uppercase; }
        .hidden { display: none !important; }
        
        /* Estilos de Revisión */
        .rev-card { border: 1px solid #30363d; padding: 20px; margin-bottom: 20px; border-radius: 8px; background: #0d1117; }
        .rev-correct { border-left: 5px solid var(--green); background: rgba(35, 134, 54, 0.1); }
        .rev-error { border-left: 5px solid var(--red); background: rgba(218, 54, 51, 0.1); }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .badge-ok { background: var(--green); color: white; }
        .badge-err { background: var(--red); color: white; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lock">
    <h1>⚠️ SEGURIDAD ACTIVADA</h1>
    <p>Pérdida de foco detectada. El examen se ha invalidado para proteger la integridad académica.</p>
</div>

<div id="p-reg" class="container">
    <h2 style="color:var(--uvm)">CERTIFICACIÓN PROFESIONAL: TECNOLOGÍAS PARA LA GESTIÓN</h2>
    <p>Prof. Jesús Ulises Villarreal López | Ciclo 2026</p>
    <input type="text" id="nom" placeholder="Nombre Completo">
    <input type="text" id="mat" placeholder="Matrícula">
    <button class="btn" onclick="iniciarExamen()">INICIAR EVALUACIÓN (35 REACTIVOS)</button>
</div>

<div id="p-exam" class="container hidden">
    <div id="timer">TIEMPO: <span id="clock">65:00</span></div>
    <div id="content"></div>
</div>

<div id="p-rev" class="container hidden">
    <h2 style="color:var(--blue)">REVISIÓN DE RESULTADOS</h2>
    <div id="rev-resumen"></div>
    <hr style="border:0; border-top: 1px solid #333; margin: 20px 0;">
    <div id="rev-lista"></div>
    <button class="btn" onclick="location.reload()" style="background:#21262d">FINALIZAR REVISIÓN Y SALIR</button>
</div>

<script>
    const db = [
        { p: "La unidad en Tokio reporta micro-caídas de latencia hacia el ERP central que colapsan la facturación. Se requiere autonomía local sin perder integridad global.", q: "¿Qué conjunto tecnológico asegura la continuidad?", o: ["Nube Híbrida (Nodos locales), Kubernetes y agentes de IA para failover.", "Aumentar el ancho de banda y solicitar informes semanales al ISP.", "Reiniciar servidores manualmente y generar facturas en texto local."], r: 0 },
        { p: "Se requiere proteger fórmulas y bases de datos VIP contra amenaza cuántica sin depender de terceros para la custodia de llaves.", q: "¿Cuál conjunto garantiza la seguridad de la propiedad intelectual?", o: ["Encriptación nativa de la nube pública y claves cambiadas cada 15 días.", "Hardware Security Modules (HSM) locales, algoritmos Post-Cuánticos (PQC) y Blockchain.", "Confiar en AES-256 estándar y carpetas compartidas con contraseña."], r: 1 },
        { p: "VIVENTU proyecta inversión de 50 MDD. Se requiere simulación de 10,000 escenarios de estrés antes de autorizar el gasto.", q: "¿Qué herramientas permiten una toma de decisiones científica?", o: ["Basar presupuesto en histórico de Tokio y encuestas de opinión.", "Gemelo Digital financiero, flujos vía DSS y simulaciones Monte Carlo.", "Postergar inversión y realizar proyecciones lineales en Excel."], r: 1 },
        { p: "La App colapsa en lanzamientos por estructura monolítica. Se requiere que cada función opere independientemente.", q: "¿Qué combinación técnica asegura escalabilidad?", o: ["Servidor físico de mayor capacidad y límites de acceso.", "Microservicios, APIs estandarizadas y flujos CI/CD.", "Mantenimientos de 6 horas y bases de datos separadas."], r: 1 },
        { p: "Marketing requiere cruzar ventas (estructurado) con reseñas en video (no estructurado).", q: "¿Qué estructura permite analítica predictiva unificada?", o: ["Data Lakehouse integrado, SQL + Machine Learning y metadatos.", "Transcribir videos a Excel y consolidar manualmente.", "Eliminar datos no estructurados y usar bases independientes."], r: 0 },
        // ... (Agrega aquí el resto de los 35 reactivos de la base anterior)
        { p: "El sistema de IA de créditos muestra sesgo demográfico. Se debe demostrar transparencia ante reguladores.", q: "¿Qué conjunto asegura gestión responsable?", o: ["Protocolos Explainable AI (XAI), Bias Testing y Comité de Ética.", "Declarar secreto industrial y volver a segmentación manual.", "Responsabilizar al proveedor externo y desactivar el módulo."], r: 0 }
    ];

    let user = {}, exam = [], userAnswers = [], current = 0, score = 0, timeLeft = 3900;

    function iniciarExamen() {
        const n = document.getElementById('nom').value;
        const m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Ingrese datos válidos.");
        
        user = { n, m, sid: Math.random().toString(36).substr(2,9).toUpperCase() };
        exam = db.sort(() => Math.random() - 0.5).slice(0, 35);
        
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        
        activarSeguridad();
        render();
        setInterval(updateTimer, 1000);
    }

    function activarSeguridad() {
        window.onblur = () => { document.getElementById('lock').style.display='block'; setTimeout(()=>location.reload(), 3000); };
        window.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && [67, 85, 86, 83, 80].includes(e.keyCode))) { e.preventDefault(); location.reload(); } };
    }

    function updateTimer() {
        if(timeLeft > 0) {
            timeLeft--;
            document.getElementById('clock').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
        } else { final(); }
    }

    function render() {
        if(current >= exam.length) return final();
        const d = exam[current];
        document.getElementById('content').innerHTML = `
            <div style="color:var(--blue); margin-bottom:10px; font-weight:bold;">PREGUNTA ${current+1} DE 35</div>
            <div class="planteamiento"><b>CASO:</b> ${d.p}</div>
            <h3>${d.q}</h3>
            ${d.o.map((o, i) => `<div class="option" onclick="registrarRespuesta(${i})">${o}</div>`).join('')}
        `;
        window.scrollTo(0,0);
    }

    function registrarRespuesta(index) {
        userAnswers.push(index);
        if(index === exam[current].r) score++;
        current++;
        render();
    }

    function final() {
        window.onblur = null;
        const nota = ((score / 35) * 10).toFixed(2);
        
        // Enviar a Google Forms
        const fd = new FormData();
        fd.append("entry.463624217", user.n);
        fd.append("entry.1087538877", user.m);
        fd.append("entry.511747513", nota);
        fd.append("entry.829394374", "Finalizado - Ver Revisión en Pantalla");
        fetch("https://docs.google.com/forms/d/e/1FAIpQLScDXtU5YmEUxUkT3gh7x-CoZVWLpOONZaERmufW6vm5wDIT7Q/formResponse", { method: "POST", mode: "no-cors", body: fd });

        mostrarRevision(nota);
    }

    function mostrarRevision(nota) {
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        
        document.getElementById('rev-resumen').innerHTML = `
            <div style="text-align:center;">
                <p>Estudiante: <b>${user.n}</b> | Matrícula: <b>${user.m}</b></p>
                <div style="font-size:3em; color:var(--uvm); font-weight:bold;">${nota}</div>
                <p>Aciertos: ${score} de 35</p>
            </div>
        `;

        let html = "";
        exam.forEach((preg, i) => {
            const esCorrecta = userAnswers[i] === preg.r;
            html += `
                <div class="rev-card ${esCorrecta ? 'rev-correct' : 'rev-error'}">
                    <span class="badge ${esCorrecta ? 'badge-ok' : 'badge-err'}">
                        ${esCorrecta ? 'CORRECTA' : 'ERROR'}
                    </span>
                    <div style="font-size:0.9em; margin-bottom:10px;"><b>Caso ${i+1}:</b> ${preg.p}</div>
                    <div style="font-weight:bold; margin-bottom:10px;">${preg.q}</div>
                    <div style="font-size:0.9em;">
                        <p style="color:${esCorrecta ? 'var(--green)' : 'var(--red)'}">
                            Tu respuesta: ${preg.o[userAnswers[i]]}
                        </p>
                        ${!esCorrecta ? `<p style="color:var(--green)"><b>Respuesta correcta:</b> ${preg.o[preg.r]}</p>` : ''}
                    </div>
                </div>
            `;
        });
        document.getElementById('rev-lista').innerHTML = html;
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
