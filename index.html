    function start() {
        user = { n: document.getElementById('nom').value, m: document.getElementById('mat').value, sid: Math.random().toString(36).substr(2, 9).toUpperCase() };
        if(user.n.length < 5 || user.m.length < 5) return alert("Ingrese datos válidos.");
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        exam = db.sort(() => Math.random() - 0.5).slice(0, 35);
        render();
        gTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('clock').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            if(timeLeft <= 0) end();
        }, 1000);
    }

    function render() {
        if(cIdx >= exam.length) return end();
        clearTimeout(qTimer);
        qTimer = setTimeout(() => { cIdx++; render(); }, 90000);
        const d = exam[cIdx];
        document.getElementById('content').innerHTML = `
            <div class="meta">REACTIVO ${cIdx + 1} DE 35</div>
            <div class="planteamiento">${d.p}</div>
            <h3>${d.q}</h3>
            ${d.o.map((opt, i) => `<div class="option" onclick="next(${i}, ${d.r})">${opt}</div>`).join('')}
        `;
    }

    function next(sel, cor) { if(sel === cor) score++; cIdx++; render(); }

    function end() {
        clearInterval(gTimer); clearTimeout(qTimer);
        const nota = ((score / 35) * 10).toFixed(2);
        const cert = btoa(`${user.m}|${nota}|${user.sid}`);
        const log = JSON.parse(localStorage.getItem('v_results')||'[]');
        log.push({...user, nota, f: new Date().toLocaleString()});
        localStorage.setItem('v_results', JSON.stringify(log));
        document.getElementById('p-exam').innerHTML = `<h2>EVALUACIÓN CONCLUIDA</h2><p>Alumno: ${user.n}</p><p>Nota: ${nota}</p><div style="background:#000; padding:20px; border:1px solid #333; word-break:break-all;"><code>CÓDIGO DE VALIDACIÓN: ${cert}</code></div>`;

    function admin() { if(prompt("Psw:")==="UVM2026") { document.getElementById('p-reg').classList.add('hidden'); document.getElementById('p-doc').classList.remove('hidden'); const log = JSON.parse(localStorage.getItem('v_results')||'[]'); document.getElementById('tabla-res').innerHTML = `<table><tr><th>Nombre</th><th>Nota</th><th>Fecha</th></tr>${log.map(r=>`<tr><td>${r.n}</td><td>${r.nota}</td><td>${r.f}</td></tr>`).join('')}</table>`; } }
