<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERTIFICACIÓN TECNOLOGÍAS PARA LA GESTIÓN 2026</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        #lock { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; color: var(--uvm); text-align: center; padding-top: 20%; }
        .container { max-width: 850px; margin: 40px auto; padding: 30px; background: var(--card); border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #timer { position: sticky; top: 0; background: var(--uvm); color: white; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; z-index: 100; margin-bottom: 20px; }
        .planteamiento { background: #0d1117; padding: 20px; border-left: 5px solid var(--uvm); margin-bottom: 25px; line-height: 1.6; border-radius: 4px; font-style: italic; }
        .option { display: block; background: #21262d; border: 1px solid #30363d; padding: 18px; margin: 10px 0; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .option:hover { border-color: var(--blue); background: #2d333b; transform: translateX(5px); }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; width: calc(100% - 35px); margin-bottom: 20px; border-radius: 6px; font-size: 16px; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; }
        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lock">
    <h1>⚠️ SEGURIDAD ACTIVADA</h1>
    <p>Pérdida de foco o intento de trampa detectado. El examen se ha invalidado.</p>
</div>

<div id="p-reg" class="container">
    <h2 style="color:var(--uvm)">CERTIFICACIÓN: TECNOLOGÍAS PARA LA GESTIÓN</h2>
    <p>Prof. Jesús Ulises Villarreal López | Ciclo 2026</p>
    <input type="text" id="nom" placeholder="Nombre Completo">
    <input type="text" id="mat" placeholder="Matrícula">
    <button class="btn" onclick="iniciarExamen()">INICIAR EVALUACIÓN</button>
</div>

<div id="p-exam" class="container hidden">
    <div id="timer">TIEMPO: <span id="clock">65:00</span></div>
    <div id="content"></div>
</div>

<script>
    const db = [
        { p: "Empresa en Tokio con latencia en ERP central de México.", q: "¿Qué tecnología asegura la disponibilidad?", o: ["Nube Híbrida con nodos locales y orquestación", "Aumentar ancho de banda", "Nube pública estándar"], r: 0 },
        { p: "Protección contra computación cuántica y soberanía digital.", q: "¿Qué conjunto asegura la propiedad intelectual?", o: ["Passwords cada 15 días", "HSM locales y algoritmos Post-Cuánticos", "AES-256 estándar"], r: 1 },
        { p: "Modelado de inversión de 50 MDD para reducir riesgo.", q: "¿Qué herramientas aseguran el ROI?", o: ["Histórico lineal", "Gemelo Digital y simulaciones Monte Carlo", "Proyecciones básicas"], r: 1 },
        { p: "Integración de Ventas, RH y Finanzas en una sola base.", q: "¿Qué sistema es?", o: ["CRM", "ERP", "SCM"], r: 1 },
        { p: "Acceso no autorizado a base de datos VIP.", q: "¿Protocolo inmediato?", o: ["Cambiar logo", "Aislamiento y auditoría de logs", "Formatear servidores"], r: 1 },
        { p: "Optimización de rutas de 500 camiones en tiempo real.", q: "¿Tecnología clave?", o: ["IA y Edge Computing", "Hojas de cálculo", "Radiofrecuencia"], r: 0 },
        { p: "Visualización de KPI en tiempo real para el CEO.", q: "¿Herramienta?", o: ["BI Dashboard", "PDF por correo", "Llamada"], r: 0 },
        { p: "Almacenamiento masivo de datos no estructurados.", q: "¿Nombre?", o: ["Data Lake", "USB", "Cinta"], r: 0 },
        { p: "Contratos digitales inmutables.", q: "¿Tecnología?", o: ["Blockchain", "Word con pass", "Email"], r: 0 },
        { p: "Ataque que inunda servidor con tráfico falso.", q: "¿Nombre?", o: ["Phishing", "DDoS", "Malware"], r: 1 },
        { p: "Análisis de sentimientos de clientes.", q: "¿Técnica?", o: ["NLP", "Manual", "SQL"], r: 0 },
        { p: "Sensores industriales conectados.", q: "¿Concepto?", o: ["IoT", "RRSS", "E-commerce"], r: 0 },
        { p: "Rasgos físicos para identidad.", q: "¿Sistema?", o: ["Biometría", "Captcha", "PIN"], r: 0 },
        { p: "Virtualización de servidores.", q: "¿Ventaja?", o: ["Escalabilidad y ahorro", "Gasto eléctrico", "Latencia"], r: 0 },
        { p: "Entornos 3D para capacitación remota.", q: "¿Tecnología?", o: ["Realidad Virtual", "PPT", "Zoom"], r: 0 },
        { p: "Respaldo en dos sitios geográficos.", q: "¿Objetivo?", o: ["DRP", "Gastar más", "Duplicar"], r: 0 },
        { p: "Software que aprende solo.", q: "¿Nombre?", o: ["Machine Learning", "Algoritmo fijo", "BIOS"], r: 0 },
        { p: "Intercambio de datos proveedores-empresa.", q: "¿Estándar?", o: ["EDI", "WA", "SMS"], r: 0 },
        { p: "Secuestro de datos por rescate.", q: "¿Amenaza?", o: ["Ransomware", "Spam", "Cookies"], r: 0 },
        { p: "Nube de pago por uso.", q: "¿Modelo?", o: ["SaaS / On-demand", "Licencia fija", "On-premise"], r: 0 },
        { p: "Manejo de carga creciente.", q: "¿Término?", o: ["Escalabilidad", "Rigidez", "Bit"], r: 0 },
        { p: "Simulación de inteligencia humana.", q: "¿Es?", o: ["IA", "Hardware", "Router"], r: 0 },
        { p: "Red privada organizacional.", q: "¿Es?", o: ["Intranet", "Dark Web", "LAN"], r: 0 },
        { p: "Conversión de datos a código secreto.", q: "¿Es?", o: ["Cifrado", "Zip", "PDF"], r: 0 },
        { p: "Filtrado de red por reglas.", q: "¿Equipo?", o: ["Firewall", "Switch", "Hub"], r: 0 },
        { p: "Servicios TI vía Internet.", q: "¿Es?", o: ["Cloud Computing", "Local", "BIOS"], r: 0 },
        { p: "Engaño para obtener claves.", q: "¿Es?", o: ["Phishing", "Firewall", "RAM"], r: 0 },
        { p: "Mantenimiento proactivo por fallas.", q: "¿Tipo?", o: ["Predictivo", "Correctivo", "Manual"], r: 0 },
        { p: "Visualización de datos complejos.", q: "¿Es?", o: ["Data Viz", "Texto", "Binario"], r: 0 },
        { p: "Comercio vía móviles.", q: "¿Es?", o: ["m-Commerce", "Retail", "Offline"], r: 0 },
        { p: "Volúmenes de datos masivos.", q: "¿Es?", o: ["Big Data", "Excel", "Note"], r: 0 },
        { p: "Software gratis con limitaciones.", q: "¿Es?", o: ["Shareware", "Malware", "App"], r: 0 },
        { p: "Mínima unidad de datos.", q: "¿Es?", o: ["Bit", "Byte", "Pixel"], r: 0 },
        { p: "Dispositivos conectados físicamente.", q: "¿Es?", o: ["IoT", "VPN", "RAM"], r: 0 },
        { p: "Gestión de relación con clientes.", q: "¿Es?", o: ["CRM", "ERP", "SCM"], r: 0 }
    ];

    let user = {}, exam = [], current = 0, score = 0, timeLeft = 3900, fallos = [];

    function iniciarExamen() {
        const n = document.getElementById('nom').value;
        const m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Datos incompletos.");
        
        user = { n, m, sid: Math.random().toString(36).substr(2,9).toUpperCase() };
        exam = db.sort(() => Math.random() - 0.5).slice(0, 35);
        
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        
        activarSeguridad();
        render();
        const t = setInterval(() => {
            timeLeft--;
            document.getElementById('clock').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(t); final(); }
        }, 1000);
    }

    function activarSeguridad() {
        window.onblur = () => { document.getElementById('lock').style.display='block'; setTimeout(()=>location.reload(), 2500); };
        window.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && [67, 85, 86, 83, 80].includes(e.keyCode))) { e.preventDefault(); location.reload(); } };
    }

    function render() {
        if(current >= exam.length) return final();
        const d = exam[current];
        document.getElementById('content').innerHTML = `
            <div style="color:var(--blue); margin-bottom:10px;">Reactivo ${current+1} de 35</div>
            <div class="planteamiento">${d.p}</div>
            <h3>${d.q}</h3>
            ${d.o.map((o, i) => `<div class="option" onclick="validar(${i}, ${d.r})">${o}</div>`).join('')}
        `;
    }

    function validar(sel, cor) {
        if(sel !== cor) fallos.push(current + 1); else score++;
        current++; render();
    }

    function final() {
        window.onblur = null;
        const nota = ((score / 35) * 10).toFixed(2);
        const errStr = fallos.length > 0 ? fallos.join(', ') : 'Ninguno';
        
        // ENVÍO A GOOGLE SHEETS
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScDXtU5YmEUxUkT3gh7x-CoZVWLpOONZaERmufW6vm5wDIT7Q/formResponse";
        const fd = new FormData();
        fd.append("entry.463624217", user.n);
        fd.append("entry.1087538877", user.m);
        fd.append("entry.511747513", nota);
        fd.append("entry.829394374", errStr);

        fetch(formURL, { method: "POST", mode: "no-cors", body: fd });

        const cert = btoa(`${user.m}|${nota}|Err:${errStr}|ID:${user.sid}`);
        document.getElementById('p-exam').innerHTML = `
            <h2 style="color:var(--blue)">EVALUACIÓN CONCLUIDA</h2>
            <p>Alumno: ${user.n}</p>
            <div style="font-size:3em; color:var(--uvm); font-weight:bold;">${nota}</div>
            <div style="background:#000; padding:15px; border:1px solid #333; margin:20px 0; text-align:left;">
                <p>Aciertos: ${score}/35 | Errores en: ${errStr}</p>
            </div>
            <code>CÓDIGO: ${cert}</code>
        `;
    }
</script>
</body>
</html>
