<script>
    // BANCO DE DATOS LINEAL (Orden Fijo del 1 al 25)
    const bancoDefinitivo = [
        { p: "CASO 1: Diagnóstico profundo PESTEL y Gap de Mercado...", q: "¿Qué premisas garantizan una cimentación estratégica sólida?", o: ["a) 1, 2, 4", "b) 2, 3, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 2: Auditoría de Riesgo de Relevancia...", q: "¿Qué conjunto de factores valida la relevancia técnica?", o: ["a) 2, 3, 5", "b) 1, 4, 6", "c) 3, 4, 5"], r: 1 },
        { p: "CASO 3: Coherencia entre diseño organizacional y diagnóstico...", q: "¿Qué elementos aseguran la coherencia operativa?", o: ["a) 1, 4, 6", "b) 2, 3, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 4: Identificación de Early Adopters globales...", q: "¿Qué características definen al segmento de validación?", o: ["a) 1, 5, 6", "b) 2, 3, 4", "c) 3, 4, 6"], r: 0 },
        { p: "CASO 5: Línea Base en Fase 0 con Gemini...", q: "¿Qué requisitos otorgan validez técnica a la Fase 0?", o: ["a) 1, 3, 6", "b) 2, 4, 5", "c) 3, 5, 6"], r: 1 },
        { p: "CASO 6: Plan de Comunicación y adaptación cultural...", q: "¿Cuáles son los pilares de la comunicación efectiva?", o: ["a) 1, 2, 5", "b) 2, 4, 5", "c) 2, 4, 6"], r: 2 },
        { p: "CASO 7: Selección de Canales y Gestión B2B/B2C...", q: "¿Qué factores determinan el éxito de la distribución?", o: ["a) 1, 2, 6", "b) 3, 4, 5", "c) 2, 5, 6"], r: 0 },
        { p: "CASO 8: Red de Socios Clave para mitigar riesgo de entrada...", q: "¿Qué roles desempeñan los socios estratégicos?", o: ["a) 1, 3, 4", "b) 1, 3, 6", "c) 2, 3, 5, 6"], r: 2 },
        { p: "CASO 9: Vehículos Jurídicos (Licencias, Franquicias, Consorcios)...", q: "¿Qué vehículos minimizan el impacto financiero?", o: ["a) 1, 3, 4", "b) 2, 4, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 10: Protocolo de Bloqueo Secuencial Nivel 5...", q: "¿Cuáles son las reglas de seguridad de auditoría?", o: ["a) 1, 4, 5", "b) 2, 3, 4, 5", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 11: Fase 6: Arquitectura de Valor y Logística...", q: "¿Qué componentes integran la arquitectura de valor?", o: ["a) 1, 3, 4", "b) 2, 3, 6", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 12: Simulación de Quiebre de Suministro...", q: "¿Cómo se garantiza la continuidad de la cadena?", o: ["a) 1, 2, 4", "b) 2, 4, 5", "c) 3, 4, 5, 6"], r: 2 },
        { p: "CASO 13: Negociación internacional y estilo bicultural...", q: "¿Qué tácticas aseguran un acuerdo exitoso?", o: ["a) 1, 3, 5", "b) 3, 4, 6", "c) 2, 4, 5"], r: 0 },
        { p: "CASO 14: Modelo de Sostenibilidad y Valor Social...", q: "¿Cómo se fundamenta el compromiso ético?", o: ["a) 2, 4, 5", "b) 1, 3, 5, 6", "c) 4, 5, 6"], r: 1 },
        { p: "CASO 15: Evaluación Drill-down final para inversión...", q: "¿Qué criterios definen el éxito de la consultoría?", o: ["a) 2, 3, 4, 6", "b) 1, 3, 6", "c) 2, 4, 5"], r: 0 },
        { p: "CASO 16: Estrategias de Control Organizacional y KPIs...", q: "¿Qué herramientas garantizan la gobernanza global?", o: ["a) 1, 2, 4, 6", "b) 3, 5, 6", "c) 2, 4, 5"], r: 0 },
        { p: "CASO 17: Centralización vs Descentralización en Tokio...", q: "¿Cuál es la estructura organizacional óptima?", o: ["a) 1, 2, 4", "b) 2, 4, 5", "c) 2, 3, 5, 6"], r: 2 },
        { p: "CASO 18: Justificar tendencia Trendsetting en salud...", q: "¿Qué factores definen a un Trendsetter?", o: ["a) 1, 3, 4, 6", "b) 1, 2, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 19: Evaluación de Tracción mediante datos reales...", q: "¿Cómo se valida científicamente la tracción?", o: ["a) 1, 2, 4, 6", "b) 2, 4, 6", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 20: Certificado de Auditoría Gemini y Semáforo...", q: "¿Qué condiciones aseguran la acreditación?", o: ["a) 1, 4, 6", "b) 1, 2, 3", "c) 2, 3, 4, 5"], r: 2 },
        { p: "CASO 21: Tácticas para alianza de capital duradera...", q: "¿Qué pilares sostienen la alianza de capital?", o: ["a) 1, 2, 5, 6", "b) 2, 4, 5", "c) 3, 5, 6"], r: 0 },
        { p: "CASO 22: Riesgo de Ejecución del MVP...", q: "¿Qué factores eliminan el riesgo de ejecución?", o: ["a) 1, 3, 6", "b) 2, 4, 5", "c) 1, 3, 4, 6"], r: 2 },
        { p: "CASO 23: Integración de Valor Social y Legitimidad...", q: "¿Cómo impacta el valor social en la legitimidad?", o: ["a) 1, 3, 5, 6", "b) 3, 4, 6", "c) 2, 5, 6"], r: 0 },
        { p: "CASO 24: Ruta para la Internacionalización...", q: "¿Cuál es la secuencia de la ruta de éxito?", o: ["a) 1, 4, 6", "b) 1, 3, 4", "c) 2, 3, 4, 6"], r: 2 },
        { p: "CASO 25: Auditoría de patrones de automatización...", q: "¿Qué normas rigen la interacción con la auditoría?", o: ["a) 1, 2, 4, 6", "b) 2, 3, 4", "c) 2, 4, 5"], r: 0 }
    ];

    let current = 0, score = 0, timeLeft = 3600, userAnswers = [];
    let qTimer, qTime = 80;

    function iniciarExamen() {
        const n = document.getElementById('nom').value;
        const m = document.getElementById('mat').value;
        if(n.length < 5 || m.length < 3) return alert("Identificación requerida para validar sesión.");

        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        document.getElementById('watermark').innerHTML = `${n}<br>${m}`;
        
        // Iniciamos directamente con el primer reactivo del banco
        render();

        // Timer General
        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                document.getElementById('clock').innerText = 
                    Math.floor(timeLeft/60).toString().padStart(2,'0') + ":" + 
                    (timeLeft%60).toString().padStart(2,'0');
            }
        }, 1000);
        
        // Deshabilitar recarga accidental por pérdida de foco
        window.onblur = null; 
    }

    function render() {
        if(current >= 25) return finish();
        
        clearInterval(qTimer); 
        qTime = 80;
        document.getElementById('timer-bar').style.width = "100%";
        
        qTimer = setInterval(() => {
            qTime--;
            document.getElementById('timer-bar').style.width = (qTime/80)*100 + "%";
            if(qTime <= 0) saveAns(-1); // Salta por tiempo
        }, 1000);

        const d = bancoDefinitivo[current]; // Acceso directo por índice
        document.getElementById('content').innerHTML = `
            <div class="planteamiento">${d.p}</div>
            <h3 style="color:#fff;">${d.q}</h3>
            <div class="option" onclick="saveAns(0)">${d.o[0]}</div>
            <div class="option" onclick="saveAns(1)">${d.o[1]}</div>
            <div class="option" onclick="saveAns(2)">${d.o[2]}</div>
        `;
    }

    function saveAns(selectedIndex) {
        // Bloqueamos clics múltiples rápidos
        const correctIndex = bancoDefinitivo[current].r;
        const isCorrect = (selectedIndex === correctIndex);
        
        userAnswers.push(isCorrect);
        if(isCorrect) score++;
        
        current++; 
        render();
    }

    function finish() {
        clearInterval(qTimer);
        localStorage.setItem("pni_parcial_final_v12", "true");
        const nota = ((score / 25) * 10).toFixed(2);

        // Envío a Google Forms
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdFBOwuPUjxnZdqSy-4YItdhe8lt5naeYaSoROCsZaMPhgkUw/formResponse";
        const formData = new FormData();
        formData.append("entry.2005620554", document.getElementById('nom').value);
        formData.append("entry.1045792443", document.getElementById('mat').value);
        formData.append("entry.1065046570", nota);
        formData.append("entry.1166974658", `Texcoco. Aciertos: ${score}/25`);

        fetch(formURL, { method: "POST", body: formData, mode: "no-cors" });

        document.getElementById('score-display').innerText = nota;
        showReview();
    }

    function showReview() {
        document.getElementById('p-exam').classList.add('hidden');
        document.getElementById('p-rev').classList.remove('hidden');
        document.body.style.overflow = "auto"; 
        
        let h = "";
        bancoDefinitivo.forEach((p, i) => {
            if(!userAnswers[i]) {
                h += `<div class="rev-card"><strong>FALLO EN CASO ${i+1}:</strong><br><p>${p.p}</p></div>`;
            }
        });
        document.getElementById('rev-lista').innerHTML = h || "<h3>CERTIFICACIÓN APROBADA SIN ERRORES</h3>";
        
        let revT = 20;
        const rInt = setInterval(() => { 
            revT--; 
            document.getElementById('rev-countdown').innerText = revT; 
            if(revT <= 0) { clearInterval(rInt); location.reload(); } 
        }, 1000);
    }
</script>
