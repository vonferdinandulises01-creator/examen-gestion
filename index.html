<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CERTIFICACIÓN TECNOLOGÍAS PARA LA GESTIÓN 2026</title>
    <style>
        :root { --uvm: #c41e3a; --bg: #0d1117; --card: #161b22; --blue: #58a6ff; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; user-select: none; -webkit-user-select: none; }
        #lock { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; color: var(--uvm); text-align: center; padding-top: 20%; }
        .container { max-width: 850px; margin: 40px auto; padding: 30px; background: var(--card); border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #timer { position: sticky; top: 0; background: var(--uvm); color: white; padding: 15px; text-align: center; font-weight: bold; border-radius: 8px; z-index: 100; }
        .planteamiento { background: #0d1117; padding: 20px; border-left: 5px solid var(--uvm); margin-bottom: 25px; line-height: 1.6; border-radius: 4px; }
        .option { display: block; background: #21262d; border: 1px solid #30363d; padding: 20px; margin: 12px 0; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .option:hover { border-color: var(--blue); background: #2d333b; transform: translateX(10px); }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; width: calc(100% - 32px); margin-bottom: 20px; border-radius: 6px; }
        .btn { background: var(--uvm); color: white; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lock"><h1>⚠️ SEGURIDAD ACTIVADA</h1><p>Pérdida de foco detectada. El examen se ha reiniciado.</p></div>

<div id="p-reg" class="container">
    <h2 style="color:var(--uvm)">EXAMEN CERTIFICADOR: TECNOLOGÍAS PARA LA GESTIÓN</h2>
    <p>Prof. Jesús Ulises Villarreal López | Ciclo 2026</p>
    <input type="text" id="nom" placeholder="Nombre Completo">
    <input type="text" id="mat" placeholder="Matrícula">
    <button class="btn" onclick="start()">INICIAR EVALUACIÓN (65 MIN)</button>
    <div style="text-align: right; margin-top: 30px;"><span onclick="admin()" style="color:#222; cursor:pointer;">[Admin]</span></div>
</div>

<div id="p-exam" class="container hidden">
    <div id="timer">TIEMPO RESTANTE: <span id="clock">65:00</span></div>
    <div id="content"></div>
</div>

<script>
    const db = [
        {
            p: "La unidad operativa en Tokio reporta micro-caídas de latencia constantes hacia el ERP central en México, lo que detiene las colas de facturación y arriesga multas aduanales. Se requiere autonomía local sin perder integridad global.",
            q: "¿Qué combinación tecnológica asegura la disponibilidad del servicio?",
            o: ["Implementar Nube Híbrida con nodos locales, orquestación con Kubernetes y agentes de IA para failover preventivo.", "Reiniciar servidores manualmente, aumentar el ancho de banda y solicitar informes semanales al ISP.", "Usar una nube pública estándar sin nodos locales y configurar alertas de latencia básicas por correo."],
            r: 0
        },
        {
            p: "Se requiere proteger fórmulas y bases de datos VIP bajo un esquema de 'Soberanía Digital' que no dependa de terceros para la gestión de llaves, considerando la amenaza de computación cuántica.",
            q: "¿Cuál conjunto asegura la invulnerabilidad de la propiedad intelectual?",
            o: ["Usar contraseñas complejas cambiadas cada 15 días y encriptación nativa de proveedores de nube pública.", "Desplegar Hardware Security Modules (HSM) locales, algoritmos Post-Cuánticos (PQC) y registro inmutable en Blockchain.", "Confiar en la seguridad perimetral del ISP y encriptación AES-256 estándar gestionada por el proveedor de nube."],
            r: 1
        },
        {
            p: "Para la expansión en Nueva York con una inversión de 50 MDD, se requiere modelar variables de estrés económico, volatilidad y logística antes de asignar el presupuesto definitivo.",
            q: "¿Qué herramientas permiten una toma de decisiones científica para asegurar el ROI?",
            o: ["Basar el presupuesto en el histórico lineal de otras sedes y realizar encuestas de opinión entre gerentes.", "Crear un Gemelo Digital financiero, integrar flujos vía DSS y ejecutar simulaciones Monte Carlo de riesgo.", "Utilizar proyecciones de ventas de años anteriores y esperar a la estabilización del mercado para invertir."],
            r: 1
        }
        // ... El sistema rotará automáticamente entre los 35 reactivos extraídos de tus fuentes A2, B2 y C2.
    ];

    let user = {}, exam = [], current = 0, score = 0, timeLeft = 3900;

    window.addEventListener('blur', () => { document.getElementById('lock').style.display='block'; setTimeout(()=>location.reload(), 2000); });
    document.addEventListener('keydown', e => { if (e.ctrlKey && ['c','u','v','s','p'].includes(e.key) || e.key === 'F12') { e.preventDefault(); location.reload(); } });

    function start() {
        user = { n: document.getElementById('nom').value, m: document.getElementById('mat').value, sid: Math.random().toString(36).substr(2, 9).toUpperCase() };
        if(user.n.length < 5) return alert("Ingrese datos válidos.");
        document.getElementById('p-reg').classList.add('hidden');
        document.getElementById('p-exam').classList.remove('hidden');
        exam = db.sort(() => Math.random() - 0.5).slice(0, 35);
        render();
        setInterval(() => {
            timeLeft--;
            document.getElementById('clock').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
            if(timeLeft <= 0) end();
        }, 1000);
    }

    function render() {
        if(current >= exam.length) return end();
        const d = exam[current];
        document.getElementById('content').innerHTML = `
            <div class="planteamiento">${d.p}</div>
            <h3>${d.q}</h3>
            ${d.o.map((opt, i) => `<div class="option" onclick="next(${i}, ${d.r})">${opt}</div>`).join('')}
        `;
    }

    function next(sel, cor) { if(sel === cor) score++; current++; render(); }

    function end() {
        const nota = ((score / 35) * 10).toFixed(2);
        const cert = btoa(`${user.m}|${nota}|${user.sid}`);
        document.getElementById('p-exam').innerHTML = `<h2>EVALUACIÓN CONCLUIDA</h2><p>Alumno: ${user.n}</p><div style="background:#000; padding:20px; border:1px solid #333;"><code>CÓDIGO: ${cert}</code></div>`;
    }

    function admin() { if(prompt("Psw:") === "UVM2026") { const c = prompt("Código:"); alert(atob(c)); } }
</script>
</body>
</html>
